<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Products Management Fashion</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="./css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="icon" type="image/png" href="./image/alexstore.png">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="header-inner">
                <div>
                    <a href="index.html" target="_self" class="text-decoration-none w-50px">
                        <img src="./image/alexstore.png" alt="Logo" style="width: 64px; height: 64px;">
                        <span class="text-dark">Products Management Fashion</span>
                    </a>
                </div>
                <button class="btn-primary" id="btn-add-new">Add New</button>
            </div>
        </div>
    </header>

    <div class="container">

        <!-- Filters -->
        <div class="filters">
            <input type="text" class="search-input" id="search-input" placeholder="Tìm theo tên sản phẩm..." />
            <select class="category-select" id="category-select">
                <option value="all">Tất cả danh mục</option>
            </select>
        </div>

        <!-- Product Grid -->
        <main class="product-grid" id="product-grid"></main>

        <!-- Pagination -->
        <div class="pagination">
            <button class="btn-page" id="btn-prev" disabled>Prev</button>
            <span class="page-info" id="page-info">1 / 4</span>
            <button class="btn-page" id="btn-next">Next</button>
        </div>

    </div>

    <div class="modal-overlay" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">Tạo sản phẩm</h2>
                <button class="btn-close" id="btn-close-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label for="p-name">Tên sản phẩm</label>
                    <input type="text" id="p-name" class="form-input" placeholder="Enter name product" />
                    <span class="error-msg" id="err-name">Tên không được để trống</span>
                </div>
                <div class="form-group">
                    <label for="p-price">Giá</label>
                    <input type="number" id="p-price" class="form-input" step="0.01" placeholder="Enter price" />
                    <span class="error-msg" id="err-price">Giá phải lớn hơn 0</span>
                </div>
                <div class="form-group">
                    <label for="p-category">Category</label>
                    <input type="text" id="p-category" class="form-input" placeholder="Nhập category" />
                    <span class="error-msg" id="err-category">Category không được để trống</span>
                </div>
                <div class="form-group">
                    <label for="p-image">Image URL</label>
                    <input type="text" id="p-image" class="form-input" placeholder="Enter URL" />
                    <span class="error-msg" id="err-image">Image URL không hợp lệ</span>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="btn-cancel">Hủy</button>
                <button class="btn-primary" id="btn-save">Save</button>
            </div>
        </div>
    </div>

    <!-- Delete Confirm Modal -->
    <div class="modal-overlay" id="confirm-modal">
        <div class="modal-content confirm-content">
            <div class="confirm-body">
                <h3>Xác nhận xóa</h3>
                <p>Bạn nhất định phải xóa sản phẩm này?</p>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="confirm-cancel">Hủy</button>
                <button class="btn-danger" id="confirm-delete">Xóa</button>
            </div>
        </div>
    </div>

    <script type="module" src="./src/script.js"></script>

</body>

</html>
